version: "3.9"

services:

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15
    container_name: lsn_db
    restart: always
    environment:
      POSTGRES_USER: lsn_user
      POSTGRES_PASSWORD: lsn_password
      POSTGRES_DB: lsn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  # ==========================================
  # FastAPI Backend
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lsn_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app


volumes:
  postgres_data: