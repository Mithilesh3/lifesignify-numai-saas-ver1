version: "3.9"

services:

  db:
    image: postgres:15
    container_name: lsn_db
    environment:
      POSTGRES_USER: lsn_user
      POSTGRES_PASSWORD: lsn_password
      POSTGRES_DB: lsn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lsn_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
